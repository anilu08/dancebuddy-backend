# Render Blueprint for DanceBuddy Backend
services:
  - type: web
    name: dancebuddy-api
    env: python
    buildCommand: pip install -r requirements.txt
    # Added -u for unbuffered English logs and $PORT for Render compatibility
    startCommand: python -u -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: dancebuddy
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
